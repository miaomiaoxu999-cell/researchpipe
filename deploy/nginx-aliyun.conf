# Aliyun nginx config for rp.zgen.xin + rpadmin.zgen.xin
# Drop into /etc/nginx/sites-available/rp.zgen.xin and symlink to sites-enabled
# Then: sudo nginx -t && sudo systemctl reload nginx
# Get certs: sudo certbot --nginx -d rp.zgen.xin -d rpadmin.zgen.xin

# ─── Public API + Frontend ──────────────────────────────────────────────────
server {
    listen 80;
    server_name rp.zgen.xin www.rp.zgen.xin;
    return 301 https://rp.zgen.xin$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rp.zgen.xin www.rp.zgen.xin;

    ssl_certificate     /etc/letsencrypt/live/rp.zgen.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rp.zgen.xin/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # SSE / streaming friendly
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Standard forwarded headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # All paths → frontend (which internally proxies /v1, /downloads to backend)
    location / {
        proxy_pass http://127.0.0.1:7786;
    }

    # Block external access to /admin via main domain — only via rpadmin.zgen.xin
    location /admin {
        return 404;
    }
}

# ─── Internal admin console ─────────────────────────────────────────────────
server {
    listen 80;
    server_name rpadmin.zgen.xin;
    return 301 https://rpadmin.zgen.xin$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rpadmin.zgen.xin;

    ssl_certificate     /etc/letsencrypt/live/rpadmin.zgen.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpadmin.zgen.xin/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Optional: IP allowlist for admin (uncomment + adjust)
    # allow 1.2.3.4;       # your home IP
    # deny all;

    # Root rewrites to /admin so URL bar shows rpadmin.zgen.xin/ but Next.js routes /admin
    location = / {
        rewrite ^ /admin/ break;
        proxy_pass http://127.0.0.1:7786;
    }
    location / {
        # Serve everything by rewriting hostname-paths to /admin/*.
        # Simplest: just proxy and let Next.js handle; admin UI is at /admin
        # Easiest UX: redirect any path to /admin/<path>
        rewrite ^/(?!admin)(.*) /admin/$1 break;
        proxy_pass http://127.0.0.1:7786;
    }
}
