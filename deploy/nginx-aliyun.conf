# Aliyun nginx config for rp.zgen.xin + rpadmin.zgen.xin
# Lives at /etc/nginx/conf.d/rp.conf on the aliyun host (39.105.141.168).
# Reuses the existing zgen.xin wildcard cert (same one chaoview/jiwa use).
#
# First-time setup (one-shot — only run once when adding rp.* subdomains):
#   sudo cp deploy/nginx-aliyun.conf /etc/nginx/conf.d/rp.conf
#   sudo certbot certonly --webroot -w /var/www/html --expand --cert-name zgen.xin \
#     -d zgen.xin -d admin.zgen.xin -d app.zgen.xin -d chaoview.zgen.xin \
#     -d jiwa.zgen.xin -d jiwaadmin.zgen.xin -d m.zgen.xin \
#     -d rp.zgen.xin -d rpadmin.zgen.xin \
#     --non-interactive --agree-tos --email YOUR@EMAIL
#   sudo nginx -t && sudo systemctl reload nginx

# ─── HTTP → HTTPS redirect (also serves ACME challenges) ────────────────────
server {
    listen 80;
    server_name rp.zgen.xin rpadmin.zgen.xin;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# ─── Public: Landing / Agent / API / Docs ──────────────────────────────────
server {
    listen 443 ssl http2;
    server_name rp.zgen.xin;
    ssl_certificate     /etc/letsencrypt/live/zgen.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zgen.xin/privkey.pem;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";

    # SSE / streaming friendly (agent answers stream up to ~3 min)
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    client_max_body_size 8m;

    # All paths → frp tunnel :7786 → laptop frontend :3726
    # Frontend internally proxies /v1, /downloads, /healthz to backend :3725.
    location / {
        proxy_pass http://127.0.0.1:7786;
    }

    # Block external access to /admin via main domain — only via rpadmin.zgen.xin
    location /admin {
        return 404;
    }
}

# ─── Internal admin console ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name rpadmin.zgen.xin;
    ssl_certificate     /etc/letsencrypt/live/zgen.xin/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zgen.xin/privkey.pem;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_buffering off;
    proxy_read_timeout 120s;
    client_max_body_size 8m;

    # Optional IP allowlist for admin (uncomment + set your IPs):
    # allow 1.2.3.4;       # home IP
    # deny all;

    # Rewrite root and any non-/admin path to /admin/* on the same upstream
    location = / {
        rewrite ^ /admin/ break;
        proxy_pass http://127.0.0.1:7786;
    }
    location / {
        rewrite ^/(?!admin)(.*) /admin/$1 break;
        proxy_pass http://127.0.0.1:7786;
    }
}
